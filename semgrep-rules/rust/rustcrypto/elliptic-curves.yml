---
rules:
  - id: rust.crypto.rustcrypto.elliptic-curves-bignp256
    message: Detected BIGN P-256 elliptic curve usage
    severity: INFO
    languages:
      - rust
    pattern-either:
      - pattern-regex: 'bignp256::[^;]+'
    metadata:
        category: security
        subcategory: cryptography
        confidence: HIGH
        crypto:
          assetType: algorithm
          algorithmPrimitive: signature
          algorithmFamily: elliptic-curves
          algorithmName: P-256
          library: RustCrypto

