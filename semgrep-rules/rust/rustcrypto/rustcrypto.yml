---
rules:
  - id: rust.crypto.rustcrypto.ml-kem
    message: Detected Rustcrypto ML-KEM usage
    severity: INFO
    languages:
      - rust
    pattern-either:
      - pattern-regex: 'ml_kem::[^;]+'
    metadata:
        category: security
        subcategory: cryptography
        confidence: HIGH
        crypto:
          assetType: algorithm
          algorithmPrimitive: kem
          algorithmFamily: ML-KEM
          algorithmName: ML-KEM
          library: RustCrypto

