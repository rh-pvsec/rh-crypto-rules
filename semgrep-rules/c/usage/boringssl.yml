---
# Minimal rule to detect BoringSSL library usage
rules:
  - id: c.crypto.boringssl.detect-usage
    message: BoringSSL library usage detected
    severity: INFO
    languages:
      - c
    metadata:
        category: security
        subcategory: cryptography
        confidence: HIGH
        crypto:
          library: BoringSSL
          assetType: algorithm
          algorithmPrimitive: other
          algorithmFamily: other
    pattern-either:
      - pattern-regex: OPENSSL_IS_BORINGSSL
      - pattern-regex: '#include\s+["<][^>"]*boringssl[^>"]*[>"]'
