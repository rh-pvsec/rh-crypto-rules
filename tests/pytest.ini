[pytest]
testpaths = .
python_files = test_*.py
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
markers =
    slow: marks tests as slow (> 5 seconds)
    requires_opengrep: marks tests that require opengrep installed
timeout = 80
log_cli = false
log_cli_level = INFO
norecursedirs = integration __pycache__ .git
console_output_style = progress
